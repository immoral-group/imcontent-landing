# Configuración de la skill de análisis SEO/GSC para imcontent-landing
# Proyecto: imcontent.es

site: https://imcontent.es/

report_destinations:
  - clickup_subpage

clickup:
  parent_page_id: knvz4-242035
  workspace_id: "20639716"
  page_title_prefix: "Informe SEO"

thresholds:
  position_drop_alert: 5       # Alertar si una query cae más de N posiciones
  ctr_low_alert: 0.005         # CTR < 0.5% con impresiones altas = alerta/oportunidad
  min_impressions_opportunity: 50   # Impresiones mínimas para aparecer en sección Oportunidades
  min_impressions_alert: 100   # Impresiones mínimas para disparar alerta de 0 clics
